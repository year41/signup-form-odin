<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <header class="title">
        <div class="transparent-background">
            <img class="logo" src="" alt="logo">
            <h1 class="title">Title</h1>
        </div>
    </header>

    <div class="menu">
        <div class="description">
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Enim dolore at ea iure placeat praesentium,
                ratione in laboriosam nesciunt beatae deserunt quia aspernatur repudiandae cupiditate minus perferendis
                cum architecto illo!</p>
        </div>

        <div class="form">
            <p>Let's do this!</p>
            <form class="sign-up" action="" method="get">
                <div class="form-row">
                    <div>
                        <label for="fname">FIRST NAME</label>
                        <input id="fname" type="text">
                    </div>
                    <div>
                        <label for="lname">LAST NAME</label>
                        <input id="lname" type="text">
                    </div>
                </div>
                <div class="form-row">
                    <div>
                        <label for="email">EMAIL</label>
                        <input id="email" type="email">
                    </div>
                    <div>
                        <label for="phone">PHONE NUMBER</label>
                        <input id="phone" type="text">
                    </div>
                </div>
                <div class="form-row">
                    <div>
                        <label for="password">PASSWORD</label>
                        <input id="password" type="password">
                    </div>
                    <div>
                        <label for="confirm-password">CONFIRM PASSWORD</label>
                        <input id="confirm-password" type="password">
                    </div>
                </div>
            </form>
        </div>

        <div class="button-container">
            <button>Create Account</button>
            <p>Aready in...</p>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <header class="header">
        <img class="background" src="./images/day.jpg" alt="Peak of a mountain, clear view">
        <div>
            <img class="logo" src="./images/odin-lined.png" alt="Odin logo">
            <h1 class="title">ODIN</h1>
        </div>
        <!-- <p class="night">Photo by <a
                href="https://unsplash.com/@alexazabache?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Alex
                Azabache</a> on <a
                href="https://unsplash.com/photos/white-clouds-over-snow-covered-mountain-SHhyEcbwfBY?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
        </p> -->
        <p class="day">Photo by <a
                href="https://unsplash.com/@sirisvisual?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Sirisvisual</a>
            on <a
                href="https://unsplash.com/photos/snow-covered-mountain-under-blue-sky-during-daytime-b2Cm0AD0QqE?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
        </p>
    </header>

    <div class="information">
        <div class="description">
            <p>This is not a real online service! So please sign up to help you find what you don't need in your life or
                dreams. Just leave your fake information and enjoy the trip.<br><br>You
                know, you don't need this.</p>
        </div>

        <div class="form">
            <p>Let's do this!</p>
            <form class="sign-up" action="" method="get">
                <div class="form-row">
                    <div>
                        <label for="fname">FIRST NAME</label>
                        <input id="fname" type="text">
                    </div>
                    <div>
                        <label for="lname">LAST NAME</label>
                        <input id="lname" type="text">
                    </div>
                </div>
                <div class="form-row">
                    <div>
                        <label for="email">EMAIL</label>
                        <input id="email" type="email">
                    </div>
                    <div>
                        <label for="phone">PHONE NUMBER</label>
                        <input id="phone" type="text">
                    </div>
                </div>
                <div class="form-row">
                    <div>
                        <label for="password">PASSWORD</label>
                        <input id="password" type="password" required>
                    </div>
                    <div>
                        <label for="confirm-password">CONFIRM PASSWORD</label>
                        <input id="confirm-password" type="password" required>
                    </div>
                </div>
            </form>
        </div>

        <div class="button-container">
            <button class="btn">Create Account</button>
            <p>Already have an account? <a href="">Log in</a></p>
        </div>
    </div>
</body>

</html>
